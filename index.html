<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SnakeSnake</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: hwb(302 51% 17%);
      font-family: Arial, sans-serif;
    }

    main {
      width: min(92vw, 460px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .score {
      font-size: 18px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #dad481;
      border: 2px solid #f9fafb;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      color: #d1d5db;
      font-size: 14px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: #a91e3c;
      color: #111827;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 8px 12px;
    }

    button:focus-visible {
      outline: 3px solid #60a5fa;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>Snake</h1>
      <div class="score">Score: <span id="score">0</span></div>
    </div>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <div class="bottom">
      <span id="message">Sandra nyuruh cari sendiri.</span>
      <button id="ulangi lagi" type="button">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restart");

    const gridSize = 20;
    const cellSize = canvas.width / gridSize;
    const startSnake = [
      { x: 9, y: 10 },
      { x: 8, y: 10 },
      { x: 7, y: 10 }
    ];

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let gameOver;
    let timer;

    function resetGame() {
      snake = startSnake.map((part) => ({ ...part }));
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
      messageEl.textContent = "Use arrow keys or WASD.";
      placeFood();
      draw();
      clearInterval(timer);
      timer = setInterval(step, 120);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * gridSize),
          y: Math.floor(Math.random() * gridSize)
        };
      } while (snake.some((part) => part.x === food.x && part.y === food.y));
    }

    function step() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize;
      const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);

      if (hitWall || hitSelf) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      clearInterval(timer);
      messageEl.textContent = "Huuu..kalah. Press Restart.";
      draw();
    }

    function draw() {
      ctx.fillStyle = "#f3f4f6";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#e5e7eb";
      for (let i = 1; i < gridSize; i += 1) {
        const pos = i * cellSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }

      ctx.fillStyle = "#dc2626";
      ctx.fillRect(food.x * cellSize + 3, food.y * cellSize + 3, cellSize - 6, cellSize - 6);

      ctx.fillStyle = gameOver ? "#6b7280" : "#16a34a";
      snake.forEach((part, index) => {
        ctx.fillRect(part.x * cellSize + 2, part.y * cellSize + 2, cellSize - 4, cellSize - 4);
        if (index === 0) {
          ctx.fillStyle = gameOver ? "#4b5563" : "#15803d";
        }
      });
    }

    function setDirection(x, y) {
      const reversing = direction.x + x === 0 && direction.y + y === 0;
      if (!reversing) {
        nextDirection = { x, y };
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") setDirection(0, -1);
      if (key === "arrowdown" || key === "s") setDirection(0, 1);
      if (key === "arrowleft" || key === "a") setDirection(-1, 0);
      if (key === "arrowright" || key === "d") setDirection(1, 0);
    });

    restartBtn.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
